backend:
  name: git-gateway
  branch: main

media_folder: "images/articles"
public_folder: "/images/articles"

locale: 'fr'

collections:
  - name: "articles"
    label: "Articles"
    folder: "_articles"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date de publication", name: "date", widget: "datetime", format: "DD/MM/YYYY" }
      - { label: "Image de couverture", name: "cover", widget: "image", required: false }
      - label: "Catégorie"
        name: "category"
        widget: "select"
        options:
          - { label: "Architecture intérieure", value: "architecture" }
          - { label: "Valorisation immobilière", value: "valorisation" }
          - { label: "Retail & Hospitality", value: "retail" }
          - { label: "Conseils & tendances", value: "conseils" }
          - { label: "Actualités", value: "actualites" }
      - { label: "Résumé", name: "excerpt", widget: "text", required: false }
      - { label: "Contenu", name: "body", widget: "markdown" }
      - { label: "Publié", name: "published", widget: "boolean", default: true }
